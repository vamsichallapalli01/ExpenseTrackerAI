{% extends 'base.html' %}

{% block content %}

<div class="card shadow">

    <div class="card-body">

        <h2>

            Restore Backup

        </h2>

        <form

            method="POST"

            enctype=
            "multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button
                class="btn btn-primary">

                Restore

            </button>

        </form>

    </div>

</div>

{% endblock %}
