{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">
            <div class="card-body">

                <h2 class="text-center mb-4">
                    Register
                </h2>

                <form method="POST">
                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary w-100">
                        Create Account
                    </button>
                </form>

                <hr>

                <p class="text-center">
                    Already have an account?
                    <a href="{% url 'login' %}">
                        Login
                    </a>
                </p>

            </div>
        </div>

    </div>
</div>

{% endblock %}
