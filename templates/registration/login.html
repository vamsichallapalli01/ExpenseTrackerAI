{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-body">

                <h2 class="mb-4">Login</h2>

                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-primary">
                        Login
                    </button>
                </form>

                <hr>

                <a href="/register/">Create Account</a>

            </div>
        </div>
    </div>
</div>

{% endblock %}
